<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Reachy Dialogue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="app-shell">
        <header class="topbar">
            <div class="brand-lockup">
                <div class="reachy-mark" aria-hidden="true">
                    <span></span>
                    <span></span>
                </div>
                <div>
                    <h1>Reachy Dialogue</h1>
                    <p id="connection-status">未连接</p>
                </div>
            </div>
            <div class="topbar-actions">
                <button id="health-btn" type="button" title="检查服务">检查</button>
                <button id="new-session-btn" type="button" title="新建 session">新建</button>
            </div>
        </header>

        <section class="settings-band" aria-label="Interaction 设置">
            <label>
                <span>服务地址</span>
                <input id="service-url" type="url" inputmode="url" autocomplete="off">
            </label>
            <label>
                <span>Conversation</span>
                <input id="conversation-id" type="text" autocomplete="off">
            </label>
            <label>
                <span>Workflow</span>
                <select id="workflow">
                    <option value="chat">chat</option>
                    <option value="onboarding">onboarding</option>
                </select>
            </label>
            <label class="toggle-line">
                <input id="tts-enabled" type="checkbox" checked>
                <span>TTS</span>
            </label>
        </section>

        <div class="workspace">
            <section class="dialogue-surface" aria-label="对话">
                <div class="surface-header">
                    <div>
                        <span class="eyebrow">Interaction</span>
                        <h2 id="session-title">未创建 session</h2>
                    </div>
                    <span id="workflow-pill" class="status-pill">chat</span>
                </div>

                <div id="timeline" class="timeline" aria-live="polite"></div>

                <section class="composer" aria-label="文本输入">
                    <textarea id="message-input" rows="3" placeholder="输入要对 Reachy 说的话"></textarea>
                    <button id="send-text-btn" type="button">发送</button>
                </section>
            </section>

            <aside class="control-rail" aria-label="控制">
                <section class="tool-panel" aria-label="语音">
                    <div class="panel-heading">
                        <span>语音</span>
                        <strong id="live-state">idle</strong>
                    </div>
                    <div class="segmented">
                        <button id="local-live-btn" type="button">本机麦克风</button>
                        <button id="robot-live-btn" type="button">机器人麦克风</button>
                    </div>
                    <div class="live-actions">
                        <button id="finish-live-btn" class="secondary-action" type="button" disabled>结束语音</button>
                        <button id="abort-live-btn" class="secondary-action" type="button" disabled>取消</button>
                    </div>
                    <p id="live-transcript" class="caption-line">等待语音输入</p>
                </section>

                <section class="tool-panel" aria-label="Run 状态">
                    <div class="panel-heading">
                        <span>Run</span>
                        <strong id="run-status">idle</strong>
                    </div>
                    <dl class="status-grid">
                        <div>
                            <dt>Session</dt>
                            <dd id="session-id">--</dd>
                        </div>
                        <div>
                            <dt>Run</dt>
                            <dd id="run-id">--</dd>
                        </div>
                        <div>
                            <dt>Playback</dt>
                            <dd id="playback-key">--</dd>
                        </div>
                        <div>
                            <dt>Live</dt>
                            <dd id="live-session-id">--</dd>
                        </div>
                    </dl>
                </section>

                <section class="tool-panel debug-panel" aria-label="事件">
                    <div class="panel-heading">
                        <span>事件</span>
                        <button id="clear-events-btn" class="secondary-action compact-action" type="button">清空</button>
                    </div>
                    <pre id="event-log">等待事件</pre>
                </section>
            </aside>
        </div>

        <div id="status-line" role="status">准备就绪</div>
    </main>

    <script src="/static/main.js"></script>
</body>

</html>

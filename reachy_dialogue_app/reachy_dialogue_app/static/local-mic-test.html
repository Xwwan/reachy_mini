<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Local Mic Dialogue Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="app-shell">
        <header class="topbar">
            <div>
                <h1>Local Mic Test</h1>
                <p id="connection-status">未检查服务</p>
            </div>
            <div class="topbar-actions">
                <a class="secondary-link" href="/">机器人页面</a>
                <button id="health-btn" type="button">检查</button>
            </div>
        </header>

        <section class="settings-panel" aria-label="设置">
            <label>
                <span>对话服务地址</span>
                <input id="service-url" type="url" inputmode="url" autocomplete="off">
            </label>
            <label>
                <span>会话 ID</span>
                <input id="conversation-id" type="text" autocomplete="off">
            </label>
            <label>
                <span>TTS</span>
                <select id="tts-enabled">
                    <option value="true">播放</option>
                    <option value="false">不播放</option>
                </select>
            </label>
            <label>
                <span>目标采样率</span>
                <input id="sample-rate" type="number" value="16000" min="16000" max="16000" step="1" disabled>
            </label>
        </section>

        <section class="voice-panel" aria-label="本机麦克风">
            <button id="record-btn" class="record-button" type="button">开始录音</button>
            <button id="abort-btn" class="record-button secondary" type="button" disabled>取消</button>
            <div id="recording-time">00:00</div>
            <div class="meter" aria-label="本机麦克风音量">
                <div class="meter-header">
                    <span>本机麦克风音量</span>
                    <strong id="mic-level-text">RMS 0.00000</strong>
                </div>
                <div class="meter-track">
                    <div id="mic-level-fill" class="meter-fill"></div>
                </div>
            </div>
            <div class="live-caption" aria-live="polite">
                <span>实时字幕（电脑麦克风）</span>
                <p id="live-transcript">等待录音</p>
            </div>
        </section>

        <section class="conversation" aria-label="对话记录">
            <div class="message user">
                <span>你说</span>
                <p id="transcript">等待录音</p>
            </div>
            <div class="message robot">
                <span>模型回答</span>
                <p id="reply">服务返回后会显示在这里</p>
            </div>
        </section>

        <section class="debug-panel" aria-label="诊断">
            <span>诊断</span>
            <pre id="debug-info">等待录音</pre>
        </section>

        <div id="status-line" role="status">准备就绪</div>
    </main>

    <script src="/static/local-mic-test.js"></script>
</body>

</html>

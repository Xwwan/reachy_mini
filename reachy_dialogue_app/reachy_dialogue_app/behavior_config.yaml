enabled: true

auto_voice:
  model_path: ../models/silero_vad.onnx
  input_gain: 1.0
  local_chunk_queue_size: 80
  robot_poll_seconds: 0.01
  transcript_poll_seconds: 0.3
  service_timeout_seconds: 120
  playback_wait_grace_seconds: 0.1
  playback_wait_max_seconds: 0.0
  wake_gate:
    enabled: true
    wake_phrases:
      - 燕聆 燕聆
      - 燕聆
      - 你好
    exit_phrases:
      - 退出
      - 再见
      - 休息吧
    idle_timeout_seconds: 60
    wake_reply: 我在。
    sleep_reply: 好，我先休息。
  vad:
    speech_threshold: 0.5
    rms_speech_threshold: 0.01
    min_speech_ms: 250
    min_silence_ms: 900
    pre_roll_ms: 300
    post_roll_ms: 250
    max_utterance_ms: 15000
    cooldown_ms: 300

modules:
  emoji:
    enabled: true
    tag_names:
      - emo
    service_url: http://127.0.0.1:8001
    request_timeout_seconds: 1.5
    method: GET
    endpoint_template: "/{key}"
    triggers:
      - excited
      - smug
      - angry
      - scared
      - sad
      - idle

  action:
    enabled: true
    tag_names:
      - act
    trigger_mode: function
    config_path: ../../action_call/config.json
    library_dir: ../../action_call/library
    sound: false
    final_home_check: true
    home_tolerance_deg: 5.0
    reset_duration: 1.5
    reset_attempts: 2
    triggers: "*"
